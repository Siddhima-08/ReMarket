<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messages</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav>
    <h2>ReMarket</h2>
    <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="profile.html">Profile</a>
        <a href="wishlist.html">Wishlist</a>
        <a href="dasboard.html">Dashboard</a>
    </div>
  </nav> 
  
  <section class="chat-container">
    <div class="chat-header">
        <h1>Messages</h1>
        <p>Chat with Seller</p>
    </div>

    <div class="chat-box">
        <div class="message seller"> Hello! This item is available.</div>

        <div class="message buyer"> Can you reduce the price?</div>

         <div class="message seller"> Yes, I can reduce it by ₹500</div>

         <div class="message buyer"> Okay, I will buy it.</div>
    </div>

    <div class="chat-input">
        <input type="text" placeholder="Type a message">
        <button>Send</button>
    </div>
  </section>
</body>
<script src="./chat.js"></script>
</html>
